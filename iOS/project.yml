name: Chewmark
options:
  bundleIdPrefix: com.shimondeitel.dentaltrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Chewmark:
    type: application
    platform: iOS
    sources:
      - path: Chewmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dentaltrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Chewmark/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ChewmarkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChewmarkTests
    dependencies:
      - target: Chewmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dentaltrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ChewmarkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ChewmarkUITests
    dependencies:
      - target: Chewmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.dentaltrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Chewmark:
    build:
      targets:
        Chewmark: all
        ChewmarkTests: [test]
        ChewmarkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Chewmark.storekit
    test:
      config: Debug
      storeKitConfiguration: Chewmark.storekit
      targets:
        - ChewmarkTests
        - ChewmarkUITests
    archive:
      config: Release
